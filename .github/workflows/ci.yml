name: CI Guard
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Test CLI
        run: node dist/cli.js install -d /tmp/test-repo
      - name: Verify output
        run: test -f /tmp/test-repo/.github/workflows/ci.yml
